<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Fun Facts</title>
    <link rel="stylesheet" href="index.css">
  </head>
  <body>
    <h1>World Fun Facts</h1>
    <div id="map">
      <!-- Buttons for countries will be added here -->
    </div>
    <div id="fact-display">
      <h2>Fun Fact</h2>
      <p id="fact-text">Click on a country to get a fun fact!</p>
      <button id="translate-btn">Translate to English</button>
      <button id="save-btn">Save Fact</button>
    </div>
    <div id="fact-list">
      <h2>Saved Facts</h2>
      <ul id="facts-ul"></ul>
    </div>
    <script src="index.js"></script>
  </body>
</html>
